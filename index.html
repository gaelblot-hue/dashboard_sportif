<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR V6 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30,41,59,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-card { border-left: 4px solid #ef4444; animation: livePulse 2s infinite; }
        .alerte-card { border-left: 4px solid #a855f7; animation: alertPulse 2s infinite; background: rgba(168,85,247,0.1); }
        @keyframes livePulse { 0%,100%{background:rgba(239,68,68,0.05)} 50%{background:rgba(239,68,68,0.15)} }
        @keyframes alertPulse { 0%,100%{background:rgba(168,85,247,0.05)} 50%{background:rgba(168,85,247,0.2)} }
        #chat-box { scroll-behavior: smooth; height: 50vh; }
        .tab-active { color: #60a5fa; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="p-4 font-sans uppercase tracking-tighter text-[11px]">

    <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-2xl font-black text-blue-500 italic">RADAR V6 <span class="text-white text-[10px] font-light not-italic">ULTRA</span></h1>
            <p class="text-[8px] text-slate-500 font-mono italic">SOUVERAINETÉ VISUELLE · EDGE 20% ELITE MONITOR</p>
        </div>
        <div class="text-right font-mono text-[8px] text-slate-600">
            <span class="text-green-400 animate-pulse">● SIGNAL V6 ACTIF</span>
            <div id="clock" class="italic mt-1">SYNC...</div>
        </div>
    </div>

    <div class="mb-6">
        <h2 class="text-purple-400 font-black text-[10px] tracking-widest mb-3 italic">💎 SIGNAUX ÉLITE ACTIFS</h2>
        <div id="alertes-elite-display" class="space-y-3">
            <p class="text-slate-700 italic text-[9px] ml-2">En attente d'un arbitrage garanti...</p>
        </div>
    </div>

    <div class="flex gap-3 mb-6 border-b border-slate-800 overflow-x-auto">
        <button onclick="showTab('radar')" id="tab-radar" class="pb-2 px-1 text-[9px] font-black text-blue-400 border-b-2 border-blue-400 whitespace-nowrap">📡 RADAR</button>
        <button onclick="showTab('elite')" id="tab-elite" class="pb-2 px-1 text-[9px] font-black text-purple-400 border-b-2 border-transparent whitespace-nowrap">💎 ÉLITE</button>
        <button onclick="showTab('bankroll')" id="tab-bankroll" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent whitespace-nowrap">💰 BANKROLL</button>
        <button onclick="showTab('chat')" id="tab-chat" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent whitespace-nowrap">🤖 CHAT V6</button>
    </div>

    <div id="view-radar" class="space-y-4">
        <div id="radar-display" class="space-y-3"></div>
    </div>

    <div id="view-elite" class="hidden space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="glass p-3 rounded-xl border border-purple-500/30 text-center">
                <p class="text-slate-500 text-[7px] uppercase">ROI ÉLITE</p>
                <p id="roi-elite-val" class="text-purple-400 font-black text-lg">--%</p>
            </div>
            <div class="glass p-3 rounded-xl border border-purple-500/30 text-center">
                <p class="text-slate-500 text-[7px] uppercase">WINRATE >20%</p>
                <p id="winrate-elite-val" class="text-green-400 font-black text-lg">--%</p>
            </div>
        </div>
        <div class="glass p-4 rounded-xl">
            <p class="text-slate-500 text-[7px] uppercase mb-2">COURBE DE CROISSANCE ÉLITE vs STD</p>
            <canvas id="elite-growth-chart" height="150"></canvas>
        </div>
        <div id="elite-list-display" class="space-y-2 pb-10"></div>
    </div>

    <div id="view-bankroll" class="hidden space-y-4">
        <div class="glass p-4 rounded-xl text-center">
            <p class="text-slate-500 text-[7px] uppercase">SOLDE DISPONIBLE</p>
            <p class="text-yellow-400 font-black text-2xl">145.21€</p>
        </div>
        <canvas id="pnl-chart" height="120"></canvas>
    </div>

    <div id="view-chat" class="hidden flex flex-col space-y-4">
        <div id="chat-box" class="glass p-4 rounded-xl overflow-y-auto space-y-4 text-[10px] normal-case"></div>
        <div class="flex gap-2">
            <textarea id="chat-input" placeholder="MESSAGE..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-white text-[10px] outline-none resize-none"></textarea>
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-black italic">➤</button>
        </div>
    </div>

    <div id="modal-analyse" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="glass rounded-2xl p-6 max-w-lg w-full border border-blue-500/30">
            <h2 class="text-blue-400 font-black text-[12px] italic mb-4 uppercase">📡 ANALYSE LOG-ODDS TERMINÉE</h2>
            <div id="modal-content" class="text-white"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://omega-relais.onrender.com/radar";
        const BANKROLL_TOTAL = 145.21;
        let eliteChart = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);

        function showTab(tab) {
            ['radar','elite','bankroll','chat'].forEach(t => {
                document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                btn.className = `pb-2 px-1 text-[9px] font-black border-b-2 ${t === tab ? 'text-blue-400 border-blue-400' : 'text-slate-600 border-transparent'}`;
            });
            if (tab === 'elite') loadEliteData();
        }

        // DÉTECTION ÉLITE > 20%
        function checkEliteEdge(match, analyse) {
            if (analyse.edge_pct >= 20) {
                const display = document.getElementById('alertes-elite-display');
                const html = `
                    <div class="glass alerte-card p-3 rounded-xl border-2 border-purple-500/50">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-purple-400 font-black text-[10px] animate-pulse">💎 EDGE ÉLITE : ${analyse.edge_pct}%</p>
                                <p class="text-white font-black text-[11px] mt-1">${match.home_team} VS ${match.away_team}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-orange-400 font-black text-[12px]">MISE : 11.62€</p>
                                <p class="text-slate-500 text-[6px] uppercase">8% BANKROLL</p>
                            </div>
                        </div>
                    </div>`;
                display.innerHTML = html + (display.innerHTML.includes('attente') ? '' : display.innerHTML);
                if (Notification.permission === "granted") {
                    new Notification("📡 RADAR V6 : SIGNAL ÉLITE", { body: `Edge ${analyse.edge_pct}% sur ${match.home_team}` });
                }
            }
        }

        async function loadEliteData() {
            try {
                const r = await fetch(`${API_BASE}/historique/elite`);
                const d = await r.json();
                document.getElementById('roi-elite-val').innerText = d.stats_elite.roi;
                document.getElementById('winrate-elite-val').innerText = d.stats_elite.winrate;
                
                const display = document.getElementById('elite-list-display');
                display.innerHTML = d.data.map(h => `
                    <div class="glass p-3 rounded-xl border-l-4 border-purple-500">
                        <div class="flex justify-between">
                            <span class="text-white font-black">${h.match}</span>
                            <span class="text-purple-400 font-black">${h.edge_pct}% EDGE</span>
                        </div>
                        <div class="flex justify-between mt-1 text-[8px]">
                            <span class="text-slate-500">${h.pari} @ ${h.cote}</span>
                            <span class="${h.resultat === 'WIN' ? 'text-green-400' : 'text-red-400'} font-black">${h.resultat || 'EN ATTENTE'}</span>
                        </div>
                    </div>
                `).join('');
                
                renderEliteChart(d.data);
            } catch(e) { console.error("Erreur Elite", e); }
        }

        function renderEliteChart(data) {
            const ctx = document.getElementById('elite-growth-chart').getContext('2d');
            if (eliteChart) eliteChart.destroy();
            eliteChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i + 1),
                    datasets: [{
                        label: 'Croissance Élite',
                        data: data.map((h, i) => data.slice(0, i+1).reduce((acc, curr) => acc + (curr.gain || 0), 0)),
                        borderColor: '#a855f7',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
            });
        }

        // INIT
        window.onload = () => { 
            if (Notification.permission !== "denied") Notification.requestPermission();
            showTab('radar'); 
        };
    </script>
</body>
</html>
