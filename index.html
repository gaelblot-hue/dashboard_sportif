<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR V5 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-card { border-left: 3px solid #ef4444; background: rgba(239, 68, 68, 0.05); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-3 font-sans uppercase tracking-tighter text-[11px]">

    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
        <h1 class="text-xl font-black text-blue-500 italic">RADAR V5 <span class="text-white text-[9px] font-normal not-italic">ULTRA</span></h1>
        <div class="text-[9px] text-green-400 font-mono animate-pulse">● SIGNAL ACTIF</div>
    </div>

    <div id="main-container" class="space-y-8"></div>

    <script>
        const API = "https://omega-relais.onrender.com/radar";
        const container = document.getElementById('main-container');
        const CONFIG = [
            {id: 'global_hockey', label: '🏒 HOCKEY (NHL/EURO)', color: 'text-sky-400'},
            {id: 'global_basket', label: '🏀 BASKET MONDE', color: 'text-orange-500'},
            {id: 'football', label: '⚽ FOOTBALL ELITE', color: 'text-green-500'}
        ];

        async function load() {
            let html = "";
            for (const sport of CONFIG) {
                try {
                    const r = await fetch(`${API}/${sport.id}`);
                    const j = await r.json();
                    let items = "";

                    if (j.data && j.data.length > 0) {
                        // TRI : LIVE EN PREMIER, PUIS AVANT-MATCH
                        j.data.forEach(m => {
                            const hasOdds = m.bookmakers.length > 0;
                            items += `
                            <div class="glass p-3 rounded-lg mb-2 flex justify-between items-center ${hasOdds ? 'live-card' : 'opacity-50'}">
                                <div>
                                    <p class="font-black">${m.home_team} - ${m.away_team}</p>
                                    <div class="flex gap-2 mt-1 items-center">
                                        <span class="px-1 rounded bg-slate-800 text-[8px] border border-white/10 italic">
                                            ${hasOdds ? '<span class="text-red-500 font-black">● LIVE</span>' : 'EN ATTENTE'}
                                        </span>
                                        <button class="bg-blue-600 px-2 py-0.5 rounded text-white font-black text-[8px]">🎥 HIGHLIGHT</button>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="text-[8px] bg-slate-900 px-2 py-1 rounded text-slate-400">SCAN OK</span>
                                </div>
                            </div>`;
                        });
                    }
                    html += `<div><h2 class="${sport.color} font-black mb-3 tracking-widest">${sport.label}</h2>${items}</div>`;
                } catch (e) { console.error(e); }
            }
            container.innerHTML = html;
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
