<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR SPORT V5 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .pulse-green { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">RADAR V5 <span class="text-white text-sm font-normal">ULTRA</span></h1>
            <p class="text-xs text-slate-400">STATUS: <span id="status" class="text-green-400 pulse-green italic">CONNECTÉ À OMEGA-RELAIS</span></p>
        </div>
        <div class="text-right">
            <span id="clock" class="text-xl font-mono">00:00:00</span>
        </div>
    </header>

    <section class="mb-8">
        <h2 class="text-orange-500 font-bold mb-3 flex items-center">
            🏀 SCANNER NBA (Potential Value)
        </h2>
        <div id="nba-alerts" class="space-y-3">
            <div class="card p-4 rounded-xl flex justify-between items-center">
                <span class="text-slate-400 italic text-sm">En attente du signal Balldontlie...</span>
            </div>
        </div>
    </section>

    <section class="mb-8">
        <h2 class="text-green-500 font-bold mb-3 flex items-center">
            ⚽ INDICATEUR DE PRESSION LIVE
        </h2>
        <div id="live-pressure" class="grid grid-cols-1 gap-4">
            <div class="card p-4 rounded-xl">
                <div class="flex justify-between mb-2">
                    <span class="font-bold">LIGUE 1 - LIVE</span>
                    <span class="text-red-500 font-mono">74'</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <div class="text-xs mb-1 flex justify-between"><span>DOM</span><span>EXT</span></div>
                        <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden flex">
                            <div id="press-home" class="bg-blue-500 h-full" style="width: 65%"></div>
                            <div id="press-away" class="bg-red-500 h-full" style="width: 35%"></div>
                        </div>
                    </div>
                </div>
                <div id="video-btn" class="mt-4 hidden">
                    <button class="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold text-sm">🔥 VOIR LE BUT (HIGHLIGHTLY)</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // CONFIGURATION RADAR
        const RELAY_URL = "https://omega-relais.onrender.com";

        // Horloge temps réel
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Appel au Relais pour les données NBA / Foot
        async function updateRadar() {
            try {
                // Ici on appellera tes routes /nba et /live-football sur Render
                console.log("Ping Omega-Relais...");
                // Simulation d'une alerte "Potential Value"
            } catch (err) {
                document.getElementById('status').innerText = "SIGNAL PERDU";
                document.getElementById('status').classList.replace('text-green-400', 'text-red-500');
            }
        }

        // Mise à jour auto toutes les 30 secondes
        setInterval(updateRadar, 30000);
        updateRadar();
    </script>
</body>
</html>
