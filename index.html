<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR V5.1 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .live-card { border-left: 3px solid #ef4444; background: rgba(239, 68, 68, 0.05); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body class="p-3 font-sans uppercase tracking-tighter text-[11px]">

    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
        <div>
            <h1 class="text-xl font-black text-blue-500 italic text-shadow-lg">RADAR V5.1 <span class="text-white text-[9px] font-normal not-italic">ULTRA</span></h1>
            <p class="text-[8px] text-slate-500 font-mono">GLOBAL MULTI-SCANNER ACTIVE</p>
        </div>
        <div class="text-right">
            <span class="text-[9px] text-green-400 font-mono animate-pulse block">● SIGNAL LIVE</span>
            <span id="timer" class="text-[7px] text-slate-600 font-mono italic">MAJ: 00s</span>
        </div>
    </div>

    <div id="main-container" class="space-y-8 pb-20">
        </div>

    <script>
        const API = "https://omega-relais.onrender.com/radar";
        const container = document.getElementById('main-container');
        
        // CONFIGURATION DES SECTIONS
        const CONFIG = [
            {id: 'global_basket', label: '🏀 BASKET MONDE', color: 'text-orange-500'},
            {id: 'global_hockey', label: '🏒 HOCKEY (NHL/EURO)', color: 'text-sky-400'},
            {id: 'football', label: '⚽ FOOTBALL (ELITE/LATAM)', color: 'text-green-500'},
            {id: 'tennis', label: '🎾 TENNIS (ATP/WTA)', color: 'text-yellow-400'}
        ];

        let seconds = 0;
        setInterval(() => { seconds++; document.getElementById('timer').innerText = `MAJ: ${seconds}s`; }, 1000);

        async function load() {
            let html = "";
            for (const sport of CONFIG) {
                try {
                    const r = await fetch(`${API}/${sport.id}`);
                    const j = await r.json();
                    let items = "";

                    if (j.data && j.data.length > 0) {
                        j.data.forEach(m => {
                            const isLive = m.bookmakers.length > 0;
                            items += `
                            <div class="glass p-3 rounded-lg mb-2 flex justify-between items-center ${isLive ? 'live-card' : 'opacity-40'}">
                                <div class="w-2/3">
                                    <p class="font-black truncate text-slate-100">${m.home_team} vs ${m.away_team}</p>
                                    <div class="flex gap-2 mt-1 items-center">
                                        <span class="px-1.5 py-0.5 rounded bg-slate-900 text-[7px] border border-white/10 font-bold">
                                            ${isLive ? '<span class="text-red-500">● LIVE</span>' : 'EN ATTENTE'}
                                        </span>
                                        <button class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded font-black text-[7px]">🎥 HIGHLIGHT</button>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="text-[7px] bg-slate-950 px-1.5 py-0.5 rounded text-slate-500 border border-white/5 italic">SCAN OK</span>
                                </div>
                            </div>`;
                        });
                    }
                    html += `<div><h2 class="${sport.color} font-black mb-3 tracking-widest text-[10px] ml-1">${sport.label}</h2>${items || '<p class="text-slate-800 italic ml-2">Recherche signal...</p>'}</div>`;
                } catch (e) { console.error(e); }
            }
            container.innerHTML = html;
            seconds = 0;
        }

        load();
        setInterval(load, 45000); // Rafraîchissement automatique
    </script>
</body>
</html>
