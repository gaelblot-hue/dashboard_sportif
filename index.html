<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR V5.4 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(30,41,59,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-indicator { border-left: 4px solid #ef4444; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="p-4 font-sans uppercase tracking-tighter text-[11px]">

    <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-2xl font-black text-blue-500 italic">RADAR V5.4 <span class="text-white text-[10px] font-light not-italic">ULTRA</span></h1>
            <p class="text-[8px] text-slate-500 font-mono italic">AI BRAIN ACTIVE · RENDER CLOUD</p>
        </div>
        <div class="text-right font-mono">
            <span class="text-green-400 text-[9px] animate-pulse">● SIGNAL ACTIF</span>
            <div id="clock" class="text-[8px] text-slate-600 italic">SYNC...</div>
        </div>
    </div>

    <div class="flex gap-4 mb-6 border-b border-slate-800">
        <button onclick="showTab('radar')" id="tab-radar" class="pb-2 px-1 text-[9px] font-black text-blue-400 border-b-2 border-blue-400">📡 RADAR</button>
        <button onclick="showTab('bankroll')" id="tab-bankroll" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent">💰 BANKROLL</button>
        <button onclick="showTab('chat')" id="tab-chat" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent">🤖 CHAT</button>
    </div>

    <div id="view-radar">
        <div id="radar-display" class="space-y-8 text-white">
            <p class="text-slate-600 italic animate-pulse">RECHERCHE DES SIGNAUX MONDIAUX...</p>
        </div>
    </div>

    <div id="view-bankroll" class="hidden">
        <div class="glass p-4 rounded-xl">
            <h3 class="text-yellow-400 font-black text-[10px] mb-3">💰 GESTION BANKROLL</h3>
            <p class="text-slate-400 text-[9px]">Module Phase 6 en attente d'initialisation...</p>
        </div>
    </div>

    <div id="view-chat" class="hidden space-y-4">
        <div class="glass p-4 rounded-xl min-h-[200px] flex flex-col justify-end">
            <div id="chat-box" class="text-[9px] normal-case text-slate-300 space-y-2 mb-4">
                <p class="text-blue-400">🤖 RADAR : Je suis prêt, Major. Posez-moi vos questions.</p>
            </div>
            <input id="chat-input" type="text" placeholder="MESSAGE..." class="bg-slate-900 border border-slate-700 rounded p-2 text-white outline-none">
        </div>
    </div>

    <div id="modal-analyse" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="glass rounded-2xl p-6 max-w-lg w-full border border-purple-500/20">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-purple-400 font-black text-[12px]">🤖 ANALYSE CLAUDE AI</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div id="modal-content" class="text-white"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://omega-relais.onrender.com/radar";
        const SPORTS_MAP = [
            { id: 'global_basket', label: '🏀 BASKET MONDE', color: 'text-orange-500' },
            { id: 'global_hockey', label: '🏒 HOCKEY (NHL/EURO)', color: 'text-sky-400' },
            { id: 'football', label: '⚽ FOOTBALL ELITE', color: 'text-green-500' },
            { id: 'tennis', label: '🎾 TENNIS (ATP/ITF)', color: 'text-yellow-400' }
        ];

        // --- NAVIGATION ---
        function showTab(tab) {
            ['radar','bankroll','chat'].forEach(t => {
                const view = document.getElementById(`view-${t}`);
                if(view) view.classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                if(btn) btn.className = `pb-2 px-1 text-[9px] font-black border-b-2 ${t === tab ? 'text-blue-400 border-blue-400' : 'text-slate-600 border-transparent'}`;
            });
        }

        // --- MOTEUR RADAR ---
        async function updateRadar() {
            const display = document.getElementById('radar-display');
            let finalHtml = "";

            for (const sport of SPORTS_MAP) {
                try {
                    const response = await fetch(`${API_BASE}/${sport.id}`);
                    const json = await response.json();
                    let cards = "";

                    if (json.data && json.data.length > 0) {
                        json.data.forEach(m => {
                            const matchStr = JSON.stringify(m).replace(/"/g, '&quot;');
                            cards += `
                            <div class="glass p-4 rounded-xl mb-3 flex justify-between items-center border-l-4 ${m.bookmakers.length > 0 ? 'border-red-500' : 'border-slate-800 opacity-40'}">
                                <div>
                                    <h3 class="font-black text-[11px] text-white">${m.home_team} vs ${m.away_team}</h3>
                                    <p class="text-[7px] text-slate-500 mt-1 uppercase">${m.sport_key.replace(/_/g, ' ')}</p>
                                </div>
                                <button onclick="analyzeMatch('${matchStr}')" class="bg-purple-600/20 text-purple-400 border border-purple-500/30 px-3 py-1.5 rounded-lg text-[7px] font-black hover:bg-purple-600/40 transition-all">🤖 IA</button>
                            </div>`;
                        });
                    }
                    finalHtml += `<div><h2 class="${sport.color} font-black text-[10px] mb-3 ml-1">${sport.label}</h2>${cards || '<p class="text-slate-800 italic ml-4 text-[9px]">Aucun signal détecté...</p>'}</div>`;
                } catch (e) { console.error("Signal perdu sur:", sport.id); }
            }
            display.innerHTML = finalHtml;
            document.getElementById('clock').innerText = "MAJ: " + new Date().toLocaleTimeString();
        }

        // --- ANALYSE IA ---
        async function analyzeMatch(matchJson) {
            const match = JSON.parse(matchJson);
            const modal = document.getElementById('modal-analyse');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            content.innerHTML = `<div class="flex items-center gap-3 p-4"><div class="animate-spin h-4 w-4 border-2 border-purple-500 border-t-transparent rounded-full"></div><span class="text-[10px] text-slate-400 font-mono uppercase tracking-widest">Calcul de value par Claude...</span></div>`;

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ match })
                });
                const res = await response.json();

                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between border-b border-slate-800 pb-2">
                            <span class="text-white font-black text-[11px] uppercase">${match.home_team} VS ${match.away_team}</span>
                            <span class="${res.confiance >= 7 ? 'text-green-400' : 'text-yellow-400'} font-black">${res.confiance}/10 CONF</span>
                        </div>
                        <div class="bg-purple-900/20 p-3 rounded-xl border border-purple-500/30">
                            <p class="text-[10px] text-purple-400 font-black mb-2 uppercase">🎯 CONSEIL : ${res.pari}</p>
                            <p class="text-[9px] text-slate-300 normal-case leading-relaxed font-light italic">"${res.raison}"</p>
                        </div>
                        <div class="flex justify-between items-center text-[8px] font-mono text-slate-500 uppercase">
                            <span>Mise suggérée : <span class="text-white">${res.mise_conseillee}</span></span>
                            <span>Météo : <span class="text-blue-400">${res.impact_meteo || 'Stable'}</span></span>
                        </div>
                    </div>`;
            } catch(e) {
                content.innerHTML = `<p class="text-red-500 p-4 font-mono">❌ ERREUR DE CONNEXION AU SERVEUR RENDER</p>`;
            }
        }

        function closeModal() { document.getElementById('modal-analyse').classList.add('hidden'); }

        // --- INIT ---
        updateRadar();
        setInterval(updateRadar, 60000);
    </script>
</body>
</html>
