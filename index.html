<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR V5.4 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30,41,59,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        input { text-transform: none !important; }
        #chat-box { scroll-behavior: smooth; height: 50vh; }
        .bubble-user { background: rgba(37, 99, 235, 0.1); border: 1px solid rgba(37, 99, 235, 0.2); }
        .bubble-ai { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="p-4 font-sans uppercase tracking-tighter text-[11px]">

    <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-2xl font-black text-blue-500 italic">RADAR V5.4 <span class="text-white text-[10px] font-light not-italic">ULTRA</span></h1>
            <p class="text-[8px] text-slate-500 font-mono italic">AI BRAIN ACTIVE · RENDER CLOUD</p>
        </div>
        <div class="text-right font-mono text-[8px] text-slate-600">
            <span class="text-green-400 animate-pulse">● SIGNAL ACTIF</span>
            <div id="clock" class="italic mt-1">SYNC...</div>
        </div>
    </div>

    <div class="flex gap-4 mb-6 border-b border-slate-800 overflow-x-auto pb-1">
        <button onclick="showTab('radar')" id="tab-radar" class="pb-2 px-1 text-[9px] font-black text-blue-400 border-b-2 border-blue-400 whitespace-nowrap">📡 RADAR</button>
        <button onclick="showTab('bankroll')" id="tab-bankroll" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent whitespace-nowrap">💰 BANKROLL</button>
        <button onclick="showTab('chat')" id="tab-chat" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent whitespace-nowrap">🤖 CHAT</button>
    </div>

    <div id="view-radar">
        <div id="radar-display" class="space-y-8 text-white">
            <p class="text-slate-600 italic animate-pulse p-4 text-center">SCANNING GLOBAL SIGNALS...</p>
        </div>
    </div>

    <div id="view-bankroll" class="hidden">
        <div class="glass p-4 rounded-xl">
            <h3 class="text-yellow-400 font-black text-[10px] mb-3 italic">💰 BANKROLL & P&L</h3>
            <p id="bankroll-display" class="text-slate-400 text-[9px] normal-case">Chargement bankroll...</p>
        </div>
    </div>

    <div id="view-chat" class="hidden flex flex-col space-y-4">
        <div id="chat-box" class="glass p-4 rounded-xl overflow-y-auto space-y-4">
            <div class="flex justify-start">
                <div class="bubble-ai p-3 rounded-xl rounded-tl-none max-w-[85%]">
                    <p class="text-purple-400 font-black text-[8px] mb-1">🤖 RADAR AI</p>
                    <p class="text-slate-300 normal-case text-[10px]">Prêt pour l'analyse, Major. Comment se porte l'UBB ?</p>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <input id="chat-input" type="text" placeholder="VOTRE MESSAGE..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-white text-[10px] outline-none">
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-black italic">➤</button>
        </div>
    </div>

    <div id="modal-analyse" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="glass rounded-2xl p-6 max-w-lg w-full border border-purple-500/30">
            <button onclick="closeModal()" class="float-right text-slate-500 text-lg">✕</button>
            <div id="modal-content" class="text-white mt-4"></div>
        </div>
    </div>

    <script>
        // --- ADRESSE SERVEUR (Ne pas modifier) ---
        const API_BASE = "https://omega-relais.onrender.com";

        function showTab(tab) {
            ['radar','bankroll','chat'].forEach(t => {
                const v = document.getElementById(`view-${t}`);
                if(v) v.classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                if(btn) btn.className = `pb-2 px-1 text-[9px] font-black border-b-2 whitespace-nowrap ${t === tab ? 'text-blue-400 border-blue-400' : 'text-slate-600 border-transparent'}`;
            });
            if(tab === 'chat') scrollChat();
            if(tab === 'bankroll') updateBankroll();
        }

        function scrollChat() { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }

        async function updateRadar() {
            const display = document.getElementById('radar-display');
            // J'ai mis que les sports sûrs pour le test
            const sports = [
                { id: 'football', label: '⚽ FOOTBALL ELITE', path: '/radar/football' },
                { id: 'tennis', label: '🎾 TENNIS (ATP/ITF)', path: '/radar/tennis' }
            ];
            let html = "";
            for (const s of sports) {
                try {
                    const r = await fetch(API_BASE + s.path);
                    const json = await r.json();
                    let cards = "";
                    if (json.data && json.data.length > 0) {
                        json.data.forEach(m => {
                            const matchStr = JSON.stringify(m).replace(/"/g, '&quot;');
                            cards += `<div class="glass p-4 rounded-xl mb-3 flex justify-between items-center"><span class="font-black text-[10px] text-white">${m.home_team} vs ${m.away_team}</span><button onclick="analyzeMatch('${matchStr}')" class="bg-purple-600 text-white px-3 py-1.5 rounded-lg text-[7px] font-black">🤖 IA</button></div>`;
                        });
                    }
                    html += `<div class="mb-6"><h2 class="text-blue-400 font-black text-[10px] mb-3 tracking-widest">${s.label}</h2>${cards || '<p class="text-slate-800 italic ml-4 text-[8px]">En attente de signal...</p>'}</div>`;
                } catch (e) { console.error(e); }
            }
            display.innerHTML = html;
            document.getElementById('clock').innerText = "MAJ: " + new Date().toLocaleTimeString();
        }

        async function analyzeMatch(jsonStr) {
            const match = JSON.parse(jsonStr);
            const modal = document.getElementById('modal-analyse');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            content.innerHTML = `<p class="p-6 text-[9px] animate-pulse">CLAUDE AI CALCULE LA VALUE...</p>`;
            try {
                const r = await fetch(API_BASE + '/radar/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ match })
                });
                const d = await r.json();
                const a = d.analyse;
                content.innerHTML = `<div class="space-y-4"><h3 class="text-white font-black text-[11px] uppercase">${match.home_team} VS ${match.away_team}</h3><div class="bg-purple-900/20 p-4 rounded-xl border border-purple-500/20"><p class="text-[10px] text-purple-400 font-black mb-2">🎯 CONSEIL : ${a.pari_recommande}</p><p class="text-[9px] text-slate-300 normal-case italic">"${a.raison}"</p></div><div class="flex justify-between text-[8px] text-slate-500 uppercase"><span>CONF: ${a.confiance}/10</span><span>MISE: ${a.mise_conseillee}</span></div></div>`;
            } catch(e) { content.innerHTML = "<p class='text-red-500'>Erreur IA</p>"; }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            const msg = input.value.trim();
            if (!msg) return;
            box.innerHTML += `<div class="flex justify-end"><div class="bubble-user p-3 rounded-xl text-right"><p class="text-blue-400 font-black text-[8px] mb-1">👤 MOI</p><p class="text-slate-200 normal-case text-[10px]">${msg}</p></div></div>`;
            input.value = "";
            scrollChat();
            try {
                const r = await fetch(API_BASE + '/radar/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await r.json();
                if(data.reply) box.innerHTML += `<div class="flex justify-start"><div class="bubble-ai p-3 rounded-xl"><p class="text-purple-400 font-black text-[8px] mb-1">🤖 RADAR</p><p class="text-slate-300 normal-case text-[10px]">${data.reply}</p></div></div>`;
            } catch (e) { console.error(e); }
            scrollChat();
        }

        async function updateBankroll() {
            const display = document.getElementById('bankroll-display');
            try {
                const r = await fetch(API_BASE + '/radar/bankroll');
                const d = await r.json();
                display.innerHTML = `<span class="text-white font-black text-[16px]">${d.disponible} €</span><br>Mises en cours: ${d.mises.length}`;
            } catch (e) { display.innerHTML = "Erreur de chargement."; }
        }

        function closeModal() { document.getElementById('modal-analyse').classList.add('hidden'); }
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key==='Enter') sendMessage(); });

        // --- INIT ---
        updateRadar();
        setInterval(updateRadar, 60000);
    </script>
</body>
</html>
