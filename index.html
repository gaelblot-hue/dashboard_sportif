<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR V5.4 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30,41,59,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-indicator { border-left: 4px solid #ef4444; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        #chat-box { scroll-behavior: smooth; }
        input { text-transform: none !important; } /* Garde les minuscules pour le chat */
    </style>
</head>
<body class="p-4 font-sans uppercase tracking-tighter text-[11px]">

    <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-2xl font-black text-blue-500 italic">RADAR V5.4 <span class="text-white text-[10px] font-light not-italic">ULTRA</span></h1>
            <p class="text-[8px] text-slate-500 font-mono italic">AI BRAIN ACTIVE · RENDER CLOUD</p>
        </div>
        <div class="text-right font-mono text-[8px] text-slate-600">
            <span class="text-green-400 animate-pulse">● SIGNAL ACTIF</span>
            <div id="clock" class="italic mt-1">SYNC...</div>
        </div>
    </div>

    <div class="flex gap-4 mb-6 border-b border-slate-800">
        <button onclick="showTab('radar')" id="tab-radar" class="pb-2 px-1 text-[9px] font-black text-blue-400 border-b-2 border-blue-400">📡 RADAR</button>
        <button onclick="showTab('bankroll')" id="tab-bankroll" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent">💰 BANKROLL</button>
        <button onclick="showTab('chat')" id="tab-chat" class="pb-2 px-1 text-[9px] font-black text-slate-600 border-b-2 border-transparent">🤖 CHAT</button>
    </div>

    <div id="view-radar">
        <div id="radar-display" class="space-y-8 text-white">
            <p class="text-slate-600 italic animate-pulse p-4">CHARGEMENT DES SIGNAUX...</p>
        </div>
    </div>

    <div id="view-bankroll" class="hidden">
        <div class="glass p-4 rounded-xl">
            <h3 class="text-yellow-400 font-black text-[10px] mb-3 uppercase italic">💰 GESTION BANKROLL</h3>
            <p class="text-slate-400 text-[9px] normal-case">Module Phase 6 (Graphique P&L) en cours de déploiement par Papi...</p>
        </div>
    </div>

    <div id="view-chat" class="hidden flex flex-col space-y-4" style="height: 60vh;">
        <div class="glass p-4 rounded-xl flex-1 overflow-y-auto flex flex-col">
            <div id="chat-box" class="text-[10px] normal-case text-slate-300 space-y-3 pr-2">
                <p class="text-blue-400 font-bold uppercase text-[8px]">🤖 RADAR : <span class="text-slate-300 font-normal">Prêt pour l'analyse, Major. Posez vos questions sur les matchs ou la bankroll.</span></p>
            </div>
        </div>
        <div class="flex gap-2">
            <input id="chat-input" type="text" placeholder="VOTRE MESSAGE..." 
                   class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-all">
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-black font-mono">➤</button>
        </div>
    </div>

    <div id="modal-analyse" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="glass rounded-2xl p-6 max-w-lg w-full border border-purple-500/30">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-purple-400 font-black text-[12px] italic">🤖 VERDICT CLAUDE AI</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white text-lg">✕</button>
            </div>
            <div id="modal-content" class="text-white"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://omega-relais.onrender.com/radar";
        const SPORTS_MAP = [
            { id: 'global_basket', label: '🏀 BASKET MONDE', color: 'text-orange-500' },
            { id: 'global_hockey', label: '🏒 HOCKEY (NHL/EURO)', color: 'text-sky-400' },
            { id: 'football', label: '⚽ FOOTBALL ELITE', color: 'text-green-500' },
            { id: 'tennis', label: '🎾 TENNIS (ATP/ITF)', color: 'text-yellow-400' }
        ];

        // --- NAVIGATION ---
        function showTab(tab) {
            ['radar','bankroll','chat'].forEach(t => {
                const view = document.getElementById(`view-${t}`);
                if(view) view.classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                if(btn) btn.className = `pb-2 px-1 text-[9px] font-black border-b-2 ${t === tab ? 'text-blue-400 border-blue-400' : 'text-slate-600 border-transparent'}`;
            });
            if(tab === 'chat') {
                const box = document.getElementById('chat-box');
                box.scrollTop = box.scrollHeight;
            }
        }

        // --- MOTEUR RADAR ---
        async function updateRadar() {
            const display = document.getElementById('radar-display');
            let finalHtml = "";

            for (const sport of SPORTS_MAP) {
                try {
                    const response = await fetch(`${API_BASE}/${sport.id}`);
                    const json = await response.json();
                    let cards = "";

                    if (json.data && json.data.length > 0) {
                        json.data.forEach(m => {
                            const matchStr = JSON.stringify(m).replace(/"/g, '&quot;');
                            cards += `
                            <div class="glass p-4 rounded-xl mb-3 flex justify-between items-center border-l-4 ${m.bookmakers.length > 0 ? 'border-red-500' : 'border-slate-800 opacity-40'}">
                                <div>
                                    <h3 class="font-black text-[11px] text-white">${m.home_team} vs ${m.away_team}</h3>
                                    <p class="text-[7px] text-slate-500 mt-1 uppercase italic">${m.sport_key.replace(/_/g, ' ')}</p>
                                </div>
                                <button onclick="analyzeMatch('${matchStr}')" class="bg-purple-600/20 text-purple-400 border border-purple-500/30 px-3 py-1.5 rounded-lg text-[8px] font-black hover:bg-purple-600/40 transition-all">🤖 IA</button>
                            </div>`;
                        });
                    }
                    finalHtml += `<div class="mb-6"><h2 class="${sport.color} font-black text-[10px] mb-3 ml-1 tracking-widest">${sport.label}</h2>${cards || '<p class="text-slate-800 italic ml-4 text-[8px] normal-case">En attente de signal...</p>'}</div>`;
                } catch (e) { console.error("Erreur réseau:", sport.id); }
            }
            display.innerHTML = finalHtml;
            document.getElementById('clock').innerText = "MAJ: " + new Date().toLocaleTimeString();
        }

        // --- ANALYSE IA ---
        async function analyzeMatch(matchJson) {
            const match = JSON.parse(matchJson);
            const modal = document.getElementById('modal-analyse');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            content.innerHTML = `<div class="flex items-center gap-3 p-6"><div class="animate-spin h-4 w-4 border-2 border-purple-500 border-t-transparent rounded-full"></div><span class="text-[9px] text-slate-400 font-mono tracking-widest">CLAUDE AI : CALCUL DE VALUE EN COURS...</span></div>`;

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ match })
                });
                const res = await response.json();

                content.innerHTML = `
                    <div class="space-y-5">
                        <div class="flex justify-between border-b border-slate-800 pb-3">
                            <span class="text-white font-black text-[11px] uppercase italic">${match.home_team} VS ${match.away_team}</span>
                            <span class="${res.confiance >= 7 ? 'text-green-400' : 'text-yellow-400'} font-black text-[11px] underline">${res.confiance}/10 CONF</span>
                        </div>
                        <div class="bg-purple-900/10 p-4 rounded-xl border border-purple-500/20">
                            <p class="text-[10px] text-purple-400 font-black mb-3 uppercase tracking-tighter">🎯 PARI RECOMMANDÉ : ${res.pari}</p>
                            <p class="text-[9px] text-slate-300 normal-case leading-relaxed font-light italic">"${res.raison}"</p>
                        </div>
                        <div class="flex justify-between items-center text-[8px] font-mono text-slate-500 uppercase pt-2">
                            <span>MISE OPTIMALE : <span class="text-white font-bold">${res.mise_conseillee}</span></span>
                            <span>MÉTÉO : <span class="text-blue-400 font-bold">${res.impact_meteo || 'STABLE'}</span></span>
                        </div>
                    </div>`;
            } catch(e) {
                content.innerHTML = `<p class="text-red-500 p-4 font-mono text-[9px]">❌ SIGNAL INTERROMPU : SERVEUR RENDER INDISPONIBLE</p>`;
            }
        }

        // --- CHAT IA ---
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            const msg = input.value.trim();
            if (!msg) return;

            box.innerHTML += `<div class="flex justify-end"><p class="bg-blue-600/10 text-blue-400 p-2 rounded-lg border border-blue-500/20 max-w-[80%] normal-case font-bold">👤 VOUS : <span class="font-normal text-slate-200">${msg}</span></p></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await r.json();
                if(data.reply) {
                    box.innerHTML += `<div class="flex justify-start"><p class="bg-slate-800/50 text-purple-400 p-2 rounded-lg border border-purple-500/20 max-w-[80%] normal-case font-bold italic">🤖 RADAR : <span class="font-normal text-slate-300 not-italic">${data.reply}</span></p></div>`;
                }
            } catch(e) {
                box.innerHTML += `<p class="text-red-500 italic">Erreur signal...</p>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        // --- ECOUTEURS ---
        function closeModal() { document.getElementById('modal-analyse').classList.add('hidden'); }
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        // --- INIT ---
        updateRadar();
        setInterval(updateRadar, 60000);
    </script>
</body>
</html>
