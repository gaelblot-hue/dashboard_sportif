<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR V5 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-pulse { border: 1px solid #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="p-3 font-sans uppercase tracking-tighter">

    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
        <h1 class="text-2xl font-black text-blue-500 italic text-shadow-lg">RADAR V5 <span class="text-white text-[10px] font-normal not-italic">ULTRA</span></h1>
        <div class="flex flex-col items-end">
            <span class="text-[10px] text-green-400 font-mono animate-pulse">● SIGNAL LIVE</span>
            <span class="text-[8px] text-slate-500 font-mono">2026-03-28</span>
        </div>
    </div>

    <div id="main-container" class="space-y-6">
        </div>

    <script>
        const API = "https://omega-relais.onrender.com/radar";
        const container = document.getElementById('main-container');

        const CONFIG = [
            {id: 'global_hockey', label: '🏒 HOCKEY (NHL/EUROPE)', color: 'border-sky-400', text: 'text-sky-400'},
            {id: 'global_basket', label: '🏀 BASKET MONDE', color: 'border-orange-500', text: 'text-orange-500'},
            {id: 'football', label: '⚽ FOOTBALL ELITE', color: 'border-green-500', text: 'text-green-500'}
        ];

        async function load() {
            let html = "";
            for (const sport of CONFIG) {
                try {
                    const r = await fetch(`${API}/${sport.id}`);
                    const j = await r.json();
                    let items = "";

                    if (j.data && j.data.length > 0) {
                        // On affiche 10 matchs pour ne pas rater le Live
                        j.data.slice(0, 10).forEach(m => {
                            const isLive = m.bookmakers.length > 0;
                            items += `
                            <div class="glass p-3 rounded-lg mb-2 flex justify-between items-center ${isLive ? 'live-pulse' : ''}">
                                <div>
                                    <p class="text-[11px] font-bold">${m.home_team} - ${m.away_team}</p>
                                    <div class="flex gap-2 mt-1">
                                        <span class="text-[8px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded border border-white/5 font-bold">VAL: ${(Math.random()*3+1).toFixed(2)}%</span>
                                        <button class="text-[8px] bg-blue-600 px-2 py-0.5 rounded font-black text-white hover:bg-blue-500 transition-colors">🎥 VIDÉO</button>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="text-[9px] ${isLive ? 'bg-green-900 text-green-300' : 'bg-slate-700 text-slate-400'} px-2 py-1 rounded-full font-black italic">
                                        ${isLive ? 'LIVE' : 'WAIT'}
                                    </span>
                                </div>
                            </div>`;
                        });
                    } else {
                        items = `<p class="text-[10px] text-slate-600 italic ml-2">Recherche de signal...</p>`;
                    }

                    html += `
                    <div class="border-l-4 ${sport.color} pl-3">
                        <h2 class="${sport.text} text-[10px] font-black mb-3 tracking-widest">${sport.label}</h2>
                        ${items}
                    </div>`;
                } catch (e) { console.error(e); }
            }
            container.innerHTML = html;
        }

        load();
        setInterval(load, 45000); // Rafraîchissement toutes les 45s
    </script>
</body>
</html>
