<script>
        const API_BASE = "https://omega-relais.onrender.com/radar";
        let currentBankroll = { disponible: 0 };

        const SPORTS_MAP = [
            { id: 'global_basket', label: '🏀 BASKET MONDE', color: 'text-orange-500' },
            { id: 'global_hockey', label: '🏒 HOCKEY (NHL/EURO)', color: 'text-sky-400' },
            { id: 'football', label: '⚽ FOOTBALL ELITE', color: 'text-green-500' },
            { id: 'tennis', label: '🎾 TENNIS (ATP/ITF)', color: 'text-yellow-400' }
        ];

        // --- NAVIGATION ---
        function showTab(tab) {
            ['radar','historique','bankroll','resume','chat'].forEach(t => {
                const view = document.getElementById(`view-${t}`);
                if(view) view.classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                if(btn) btn.className = `pb-2 px-1 text-[9px] font-black border-b-2 ${t === tab ? 'text-blue-400 border-blue-400' : 'text-slate-600 border-transparent'}`;
            });
        }

        // --- ANALYSE IA (LA FUSION GEMINI/PAPI) ---
        async function analyzeMatch(matchJson) {
            const match = JSON.parse(matchJson);
            const modal = document.getElementById('modal-analyse');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            content.innerHTML = `<div class="flex items-center gap-3 p-4"><div class="animate-spin h-4 w-4 border-2 border-purple-500 border-t-transparent rounded-full"></div><span class="text-[10px] text-slate-400">CLAUDE ANALYSE LE SIGNAL...</span></div>`;

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ match })
                });
                const data = await response.json();
                const res = data.analyse;

                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between border-b border-slate-800 pb-2">
                            <span class="text-purple-400 font-black text-[12px] uppercase">${match.home_team} VS ${match.away_team}</span>
                            <span class="text-[10px] text-slate-500">${res.confiance}/10 CONF</span>
                        </div>
                        <p class="text-[10px] text-white font-bold bg-purple-900/20 p-2 rounded">🎯 CONSEIL : ${res.pari}</p>
                        <p class="text-[9px] text-slate-300 normal-case leading-relaxed">💡 ${res.raison}</p>
                        <div class="flex justify-between items-center text-[8px] text-slate-500 italic">
                            <span>MÉTÉO : ${res.impact_meteo || 'Stable'}</span>
                            <span class="text-yellow-500 font-bold">MISE : ${res.mise_conseillee}</span>
                        </div>
                    </div>`;
            } catch(err) {
                content.innerHTML = `<p class="text-red-500 p-4">ERREUR DE CONNEXION AU SERVEUR</p>`;
            }
        }

        // --- MOTEUR RADAR ---
        async function updateRadar() {
            let html = "";
            for (const sport of SPORTS_MAP) {
                try {
                    const r = await fetch(`${API_BASE}/${sport.id}`);
                    const json = await r.json();
                    let cards = "";

                    if (json.data) {
                        json.data.forEach(m => {
                            const matchStr = JSON.stringify(m).replace(/"/g, '&quot;');
                            cards += `
                            <div class="glass p-4 rounded-xl mb-3 flex justify-between items-center border-l-4 ${m.bookmakers.length > 0 ? 'border-red-500' : 'border-slate-800 opacity-50'}">
                                <div>
                                    <h3 class="font-black text-[11px]">${m.home_team} vs ${m.away_team}</h3>
                                    <p class="text-[7px] text-slate-500 mt-1">LIGUE: ${m.sport_key.toUpperCase()}</p>
                                </div>
                                <button onclick="analyzeMatch('${matchStr}')" class="bg-purple-600/20 text-purple-400 border border-purple-500/30 px-3 py-1.5 rounded-lg text-[7px] font-black">🤖 IA</button>
                            </div>`;
                        });
                    }
                    html += `<div><h2 class="${sport.color} font-black text-[10px] mb-3 ml-1">${sport.label}</h2>${cards || '<p class="text-slate-800 italic ml-4 text-[9px]">Recherche signal...</p>'}</div>`;
                } catch(e) {}
            }
            document.getElementById('radar-display').innerHTML = html;
            document.getElementById('clock').innerText = "MAJ: " + new Date().toLocaleTimeString();
        }

        function closeModal() { document.getElementById('modal-analyse').classList.add('hidden'); }

        updateRadar();
        setInterval(updateRadar, 60000);
    </script>
</body>
</html>
