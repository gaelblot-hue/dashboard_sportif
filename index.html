<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR V5 ULTRA 📡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-3 font-sans">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black text-blue-500">RADAR V5 <span class="text-white text-xs">ULTRA</span></h1>
        <div id="clock" class="text-[10px] font-mono text-slate-500"></div>
    </div>

    <div id="main-container" class="space-y-4">
        </div>

    <script>
        const API = "https://omega-relais.onrender.com/radar";
        const SPORTS = [
            {id: 'football', label: '⚽ FOOTBALL', color: 'border-green-500', text: 'text-green-500'},
            {id: 'basketball', label: '🏀 NBA BASKET', color: 'border-orange-500', text: 'text-orange-500'},
            {id: 'tennis', label: '🎾 TENNIS', color: 'border-yellow-400', text: 'text-yellow-400'},
            {id: 'nhl', label: '🏒 NHL HOCKEY', color: 'border-sky-400', text: 'text-sky-400'}
        ];

        async function updateSport(sport) {
            try {
                const r = await fetch(`${API}/${sport.id}`);
                const j = await r.json();
                let html = `<div class="p-3 bg-slate-900 rounded-lg border-l-4 ${sport.color}">
                    <h2 class="${sport.text} font-bold text-xs mb-2 italic">${sport.label}</h2>`;
                
                if (j.data && j.data.length > 0) {
                    j.data.slice(0, 5).forEach(m => {
                        const isLive = m.bookmakers.some(b => b.key === "pinnacle"); // Test simpliste live
                        html += `<div class="bg-slate-800/50 p-2 rounded mb-2 border-b border-slate-700/30">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold">${m.home_team} - ${m.away_team}</span>
                                <span class="text-[9px] ${isLive ? 'bg-red-600' : 'bg-slate-700'} px-1 rounded">${isLive ? 'LIVE' : 'AVANT-MATCH'}</span>
                            </div>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[10px] text-slate-500 font-mono italic">VALUE: ${Math.random().toFixed(2)}%</span>
                            </div>
                        </div>`;
                    });
                } else { html += `<p class="text-[10px] text-slate-600 italic">Aucun signal détecté...</p>`; }
                html += `</div>`;
                return html;
            } catch (e) { return ""; }
        }

        async function refreshAll() {
            const container = document.getElementById('main-container');
            let fullHtml = "";
            for (const s of SPORTS) { fullHtml += await updateSport(s); }
            container.innerHTML = fullHtml;
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }

        setInterval(refreshAll, 60000);
        refreshAll();
    </script>
</body>
</html>
